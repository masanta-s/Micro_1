global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: "user-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "user-service:9001"

  - job_name: "contact-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "contact-service:9002"

  - job_name: "api-gateway"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          - "api-gateway:8080"
