server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/users/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: userServiceCircuitBreaker
                    fallbackUri: forward:/fallback/user
            - id: contact-service
              uri: lb://contact-service
              predicates:
                - Path=/contacts/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: contactServiceCircuitBreaker
                    fallbackUri: forward:/fallback/contact
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 5
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@ipKeyResolver}"
            - id: admin-auth-service
              uri: lb://auth-service
              predicates:
                - Path=/admin/**
            - id: pickvaluelist-service
              uri: lb://pickvaluelist-service
              predicates:
                - Path=/pickvalues/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: pickValueServiceCircuitBreaker
                    fallbackUri: forward:/fallback/pickvalues
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 5
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@ipKeyResolver}"
          discovery:
            locator:
              enabled: true

  data:
    redis:
      host: redis
      port: 6379

security:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-which-is-long-and-secure-32bytes}
    expiration: 3600000

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,gateway"
  endpoint:
    gateway:
      access: unrestricted
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        endpoint: http://zipkin:9411/api/v2/spans

logging:
  pattern:
    level: "%5p [${spring.application.name}, traceId=%X{traceId}, spanId=%X{spanId}]"
  level:
    org.springframework.cloud.gateway: INFO
    com.gateway.apigateway.security: DEBUG

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      pickValueServiceCircuitBreaker:
        baseConfig: default

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://discovery-server:8761/eureka
