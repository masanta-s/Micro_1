global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "user-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["user-service:9001"]

  - job_name: "contact-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["contact-service:9002"]

  - job_name: "api-gateway"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: 'pickvaluelist-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'pickvaluelist-service:9004' ]
